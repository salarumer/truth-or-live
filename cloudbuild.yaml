steps:
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']

  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'GEMINI_API_KEY=$$GEMINI_API_KEY'
    secretEnv: ['GEMINI_API_KEY']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'
